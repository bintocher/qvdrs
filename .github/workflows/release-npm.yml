name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        run: npm install

      - name: Build native module
        run: npx napi build --features napi_support --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: bindings-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Move artifacts to platform packages
        run: |
          declare -A TARGET_MAP=(
            ["x86_64-pc-windows-msvc"]="win32-x64-msvc"
            ["x86_64-unknown-linux-gnu"]="linux-x64-gnu"
            ["aarch64-unknown-linux-gnu"]="linux-arm64-gnu"
            ["x86_64-apple-darwin"]="darwin-x64"
            ["aarch64-apple-darwin"]="darwin-arm64"
          )
          for dir in artifacts/bindings-*/; do
            target=$(basename "$dir" | sed 's/bindings-//')
            npm_dir=${TARGET_MAP[$target]}
            if [ -n "$npm_dir" ]; then
              for f in "$dir"*.node; do
                dest_name="qvdrs.${npm_dir}.node"
                cp "$f" "npm/${npm_dir}/${dest_name}"
                echo "Copied $f -> npm/${npm_dir}/${dest_name}"
              done
            fi
          done
          ls -la npm/*/*.node

      - name: Publish platform packages to npm
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"*.node 1>/dev/null 2>&1; then
              cd "$dir"
              npm publish --provenance --access public || true
              cd ../..
            fi
          done

      - name: Publish main package
        run: npm publish --provenance --access public
